<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <!-- 木纹纹理 -->
    <pattern id="woodGrain" patternUnits="userSpaceOnUse" width="200" height="8">
      <rect width="200" height="8" fill="#8a6d50"/>
      <line x1="0" y1="2" x2="200" y2="2.5" stroke="#7a5c3e" stroke-width="0.8" opacity="0.5"/>
      <line x1="0" y1="4.5" x2="200" y2="4" stroke="#9a7d60" stroke-width="0.6" opacity="0.4"/>
      <line x1="0" y1="6.5" x2="200" y2="7" stroke="#7a5c3e" stroke-width="0.7" opacity="0.3"/>
    </pattern>
    <!-- 黑板纹理 -->
    <filter id="chalkTexture">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="textured"/>
      <feComponentTransfer in="textured">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>
    <!-- 粉笔发光 -->
    <filter id="chalkGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 柔和阴影 -->
    <filter id="softShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-color="#1a1a1a" flood-opacity="0.25"/>
    </filter>
    <!-- 太阳光晕 -->
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe8a0" stop-opacity="1"/>
      <stop offset="40%" stop-color="#ffd363" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffd363" stop-opacity="0"/>
    </radialGradient>
    <!-- 黑板渐变 -->
    <linearGradient id="boardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d3a32"/>
      <stop offset="30%" stop-color="#2b3830"/>
      <stop offset="70%" stop-color="#29352d"/>
      <stop offset="100%" stop-color="#263228"/>
    </linearGradient>
    <!-- 木质边框渐变 -->
    <linearGradient id="frameTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b89970"/>
      <stop offset="50%" stop-color="#8a6d50"/>
      <stop offset="100%" stop-color="#6b5238"/>
    </linearGradient>
    <linearGradient id="frameSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b89970"/>
      <stop offset="50%" stop-color="#8a6d50"/>
      <stop offset="100%" stop-color="#6b5238"/>
    </linearGradient>
    <!-- 星光 -->
    <radialGradient id="starSparkle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ===== 最外层背景（木质墙面） ===== -->
  <rect width="1200" height="600" fill="#c8b08a"/>
  <rect width="1200" height="600" fill="url(#woodGrain)" opacity="0.3"/>

  <!-- ===== 木质外框（三层嵌套，模拟真实画框） ===== -->
  <!-- 最外层木框阴影 -->
  <rect x="52" y="52" width="1096" height="496" rx="6" fill="#5a3e28" opacity="0.6"/>
  <!-- 外框 -->
  <rect x="48" y="48" width="1104" height="504" rx="5" fill="#8a6d50"/>
  <rect x="48" y="48" width="1104" height="504" rx="5" fill="url(#woodGrain)" opacity="0.4"/>
  <!-- 内层框线 -->
  <rect x="94" y="94" width="1012" height="412" rx="3" fill="none" stroke="#7a5c3e" stroke-width="4"/>
  <rect x="98" y="98" width="1004" height="404" rx="2" fill="none" stroke="#6b5238" stroke-width="2" opacity="0.6"/>
  <!-- 四角榫卯装饰 -->
  <circle cx="98" cy="98" r="5" fill="#b89970"/>
  <circle cx="1102" cy="98" r="5" fill="#b89970"/>
  <circle cx="98" cy="502" r="5" fill="#b89970"/>
  <circle cx="1102" cy="502" r="5" fill="#b89970"/>

  <!-- ===== 黑板主体 ===== -->
  <rect x="104" y="104" width="992" height="392" rx="3" fill="url(#boardGrad)"/>

  <!-- 黑板噪点纹理 -->
  <rect x="104" y="104" width="992" height="392" rx="3" filter="url(#chalkTexture)" opacity="0.5"/>

  <!-- 粉笔灰痕迹（黑板擦残留） -->
  <ellipse cx="600" cy="300" rx="350" ry="120" fill="#eae5db" opacity="0.03"/>
  <ellipse cx="400" cy="200" rx="200" ry="80" fill="#eae5db" opacity="0.02"/>
  <ellipse cx="800" cy="400" rx="250" ry="90" fill="#eae5db" opacity="0.02"/>
  <ellipse cx="550" cy="420" rx="300" ry="50" fill="#eae5db" opacity="0.025"/>

  <!-- ===== 顶部装饰线（粉笔画出） ===== -->
  <line x1="160" y1="138" x2="370" y2="138" stroke="#c6c1b8" stroke-width="0.8" opacity="0.5" stroke-dasharray="3,5"/>
  <line x1="830" y1="138" x2="1040" y2="138" stroke="#c6c1b8" stroke-width="0.8" opacity="0.5" stroke-dasharray="3,5"/>

  <!-- ★ 星星装饰 -->
  <text x="400" y="140" text-anchor="middle" font-size="8" fill="#ffd363" opacity="0.6" filter="url(#chalkGlow)">★</text>
  <text x="600" y="140" text-anchor="middle" font-size="6" fill="#ffd363" opacity="0.4" filter="url(#chalkGlow)">✦</text>
  <text x="800" y="140" text-anchor="middle" font-size="8" fill="#ffd363" opacity="0.6" filter="url(#chalkGlow)">★</text>

  <!-- ===== 主标题 ===== -->
  <text x="600" y="210" text-anchor="middle" font-family="'Georgia','SimSun','Noto Serif SC',serif" font-size="52" font-weight="bold" fill="#eae5db" filter="url(#chalkGlow)" letter-spacing="6">🎓 智能教材问答平台</text>

  <!-- 标题下划线（粉笔手绘风格） -->
  <path d="M 260,228 Q 400,225 600,228 Q 800,231 940,228" fill="none" stroke="#ffd363" stroke-width="2" opacity="0.7" filter="url(#chalkGlow)"/>
  <path d="M 340,232 Q 500,229 600,232 Q 700,235 860,232" fill="none" stroke="#eae5db" stroke-width="0.8" opacity="0.3"/>

  <!-- ===== 副标题 ===== -->
  <text x="600" y="265" text-anchor="middle" font-family="'Georgia','KaiTi','Noto Serif SC',serif" font-size="22" fill="#c6c1b8" opacity="0.85" letter-spacing="4">K12 教育 RAG 系统 · 智能检索 · 学习辅助</text>

  <!-- ===== 技术栈标签 ===== -->
  <!-- FastAPI -->
  <rect x="240" y="295" width="110" height="32" rx="16" fill="none" stroke="#76ce9c" stroke-width="1.5" opacity="0.7"/>
  <text x="295" y="316" text-anchor="middle" font-family="'Consolas','monospace'" font-size="11" fill="#76ce9c" opacity="0.85">⚡ FastAPI</text>

  <!-- pgvector -->
  <rect x="365" y="295" width="130" height="32" rx="16" fill="none" stroke="#ffd363" stroke-width="1.5" opacity="0.7"/>
  <text x="430" y="316" text-anchor="middle" font-family="'Consolas','monospace'" font-size="11" fill="#ffd363" opacity="0.85">🐘 pgvector</text>

  <!-- LangChain -->
  <rect x="510" y="295" width="120" height="32" rx="16" fill="none" stroke="#e0cfb4" stroke-width="1.5" opacity="0.7"/>
  <text x="570" y="316" text-anchor="middle" font-family="'Consolas','monospace'" font-size="11" fill="#e0cfb4" opacity="0.85">🔗 LangChain</text>

  <!-- DeepSeek -->
  <rect x="645" y="295" width="130" height="32" rx="16" fill="none" stroke="#a0c4ff" stroke-width="1.5" opacity="0.7"/>
  <text x="710" y="316" text-anchor="middle" font-family="'Consolas','monospace'" font-size="11" fill="#a0c4ff" opacity="0.85">🤖 DeepSeek</text>

  <!-- Docker -->
  <rect x="790" y="295" width="110" height="32" rx="16" fill="none" stroke="#a0d2ff" stroke-width="1.5" opacity="0.7"/>
  <text x="845" y="316" text-anchor="middle" font-family="'Consolas','monospace'" font-size="11" fill="#a0d2ff" opacity="0.85">🐳 Docker</text>

  <!-- ===== 粉笔手写功能亮点 ===== -->
  <text x="270" y="375" font-family="'KaiTi','SimSun','Noto Serif SC',serif" font-size="16" fill="#eae5db" opacity="0.7">💬 智能问答</text>
  <text x="415" y="375" font-family="'KaiTi','SimSun','Noto Serif SC',serif" font-size="16" fill="#eae5db" opacity="0.7">📝 试题生成</text>
  <text x="560" y="375" font-family="'KaiTi','SimSun','Noto Serif SC',serif" font-size="16" fill="#eae5db" opacity="0.7">📊 错题分析</text>
  <text x="705" y="375" font-family="'KaiTi','SimSun','Noto Serif SC',serif" font-size="16" fill="#eae5db" opacity="0.7">📁 文档管理</text>
  <text x="850" y="375" font-family="'KaiTi','SimSun','Noto Serif SC',serif" font-size="16" fill="#eae5db" opacity="0.7">🗺️ 知识图谱</text>

  <!-- 分隔线 -->
  <line x1="395" y1="380" x2="405" y2="380" stroke="#9b9690" stroke-width="0.5" opacity="0.4"/>
  <line x1="540" y1="380" x2="550" y2="380" stroke="#9b9690" stroke-width="0.5" opacity="0.4"/>
  <line x1="685" y1="380" x2="695" y2="380" stroke="#9b9690" stroke-width="0.5" opacity="0.4"/>
  <line x1="830" y1="380" x2="840" y2="380" stroke="#9b9690" stroke-width="0.5" opacity="0.4"/>

  <!-- ===== 右下角粉笔签名 ===== -->
  <text x="1020" y="480" text-anchor="end" font-family="'Georgia',serif" font-size="12" fill="#9b9690" opacity="0.5" font-style="italic">— K12 Edu RAG Platform —</text>

  <!-- ===== 左上角年级标识 ===== -->
  <text x="120" y="126" font-family="'KaiTi','SimSun',serif" font-size="11" fill="#9b9690" opacity="0.45">📖 Grade 1~12</text>

  <!-- ===== 底部粉笔灰装饰 ===== -->
  <circle cx="250" cy="480" r="1.5" fill="#eae5db" opacity="0.12"/>
  <circle cx="350" cy="485" r="1" fill="#eae5db" opacity="0.10"/>
  <circle cx="500" cy="478" r="1.2" fill="#eae5db" opacity="0.08"/>
  <circle cx="650" cy="482" r="1.8" fill="#eae5db" opacity="0.10"/>
  <circle cx="800" cy="479" r="1" fill="#eae5db" opacity="0.12"/>
  <circle cx="900" cy="484" r="1.3" fill="#eae5db" opacity="0.09"/>

  <!-- ===== 左上角小太阳装饰 ===== -->
  <circle cx="85" cy="75" r="18" fill="url(#sunGlow)"/>
  <circle cx="85" cy="75" r="8" fill="#ffe8a0" opacity="0.8"/>
  <!-- 太阳光线 -->
  <line x1="85" y1="48" x2="85" y2="42" stroke="#ffd363" stroke-width="1.5" opacity="0.5"/>
  <line x1="85" y1="102" x2="85" y2="108" stroke="#ffd363" stroke-width="1.5" opacity="0.5"/>
  <line x1="58" y1="75" x2="52" y2="75" stroke="#ffd363" stroke-width="1.5" opacity="0.5"/>
  <line x1="112" y1="75" x2="118" y2="75" stroke="#ffd363" stroke-width="1.5" opacity="0.5"/>
  <line x1="66" y1="56" x2="62" y2="52" stroke="#ffd363" stroke-width="1" opacity="0.35"/>
  <line x1="104" y1="56" x2="108" y2="52" stroke="#ffd363" stroke-width="1" opacity="0.35"/>
  <line x1="66" y1="94" x2="62" y2="98" stroke="#ffd363" stroke-width="1" opacity="0.35"/>
  <line x1="104" y1="94" x2="108" y2="98" stroke="#ffd363" stroke-width="1" opacity="0.35"/>

  <!-- ===== 右上角小树装饰 🌲 ===== -->
  <text x="1120" y="82" font-size="16" opacity="0.5">🌲</text>
  <text x="1140" y="92" font-size="10" opacity="0.35">🌳</text>

  <!-- ===== 四个角落星光 ===== -->
  <circle cx="110" cy="110" r="1.5" fill="#fff" opacity="0.4"/>
  <circle cx="1090" cy="108" r="1.2" fill="#fff" opacity="0.3"/>
  <circle cx="112" cy="492" r="1" fill="#fff" opacity="0.25"/>
  <circle cx="1088" cy="490" r="1.4" fill="#fff" opacity="0.35"/>
</svg>
