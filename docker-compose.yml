# docker-compose.yml
# 本地开发一键启动: docker compose up -d
# 查看日志: docker compose logs -f api

services:
  # ===== 数据库 (PostgreSQL + pgvector) =====
  postgres:
    image: pgvector/pgvector:pg16
    container_name: edu-postgres
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-edu_pass}
      POSTGRES_DB: ${DB_NAME:-edu_knowledge}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===== 缓存 (Redis) =====
  redis:
    image: redis:7-alpine
    container_name: edu-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ===== API 服务 (FastAPI) =====
  api:
    build: .
    container_name: edu-api
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-edu_pass}
      DB_NAME: ${DB_NAME:-edu_knowledge}
      REDIS_URL: redis://redis:6379
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_API_BASE: ${LLM_API_BASE:-https://api.deepseek.com/v1}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-v3}
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ===== Web UI (新版静态前端,默认) =====
  ui-static:
    image: nginx:alpine
    container_name: edu-ui-static
    ports:
      - "3000:80"
    volumes:
      - ./ui/nginx-static.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ui/index.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - api
    restart: unless-stopped

  # ===== Nginx 反向代理 (可选，生产环境使用) =====
  nginx:
    image: nginx:alpine
    container_name: edu-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ui/index.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - api
    restart: unless-stopped
    profiles:
      - production  # 仅在 docker compose --profile production up 时启动

volumes:
  pgdata:
